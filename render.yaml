services:
  - type: web
    name: boops-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: BOOPS_INTERNAL_SECRET
        sync: false
